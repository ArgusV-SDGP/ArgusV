version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: argus-kafka-init
    depends_on:
      - kafka
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      # 1. Wait for Kafka to be ready
      echo 'Waiting for Kafka broker to be available...'
      cub kafka-ready -b kafka:29092 1 60
      
      echo 'Kafka is up! Creating topics...'
      
      # 2. Define standard topics (Retention in ms: 1h=3600000, 24h=86400000, 7d=604800000)
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw-detections --partitions 4 --config retention.ms=3600000
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic vlm-requests --partitions 4 --config retention.ms=3600000
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic vlm-results --partitions 4 --config retention.ms=86400000
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic actions --partitions 4 --config retention.ms=86400000
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic config-updates --partitions 1 --config retention.ms=604800000
      
      # 3. Define Dead Letter Queues (DLQs)
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw-detections.dlq --partitions 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic vlm-requests.dlq --partitions 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic vlm-results.dlq --partitions 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic actions.dlq --partitions 1
      
      echo '--------------------------------------------------'
      echo 'Successfully created the following topics:'
      kafka-topics --bootstrap-server kafka:29092 --list
      echo '--------------------------------------------------'
      "

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: password
      POSTGRES_DB: argus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
      - "9002:9001"
    volumes:
      - ./configs/mosquitto:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # ---------------------------------------------------------------------------
  # DEVELOPMENT SERVICES (Hot Reload & Mounts)
  # ---------------------------------------------------------------------------

  edge-gateway:
    build: ./services/edge-gateway
    container_name: argus-edge-gateway
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RTSP_URLS: "rtsp://simulator:8554/stream"
    volumes:
      - ./services/edge-gateway:/app
      - ./libs/shared:/app/shared
    command: python src/main.py
    depends_on:
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  stream-ingestion:
    build: ./services/stream-ingestion
    container_name: argus-stream-ingestion
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_URL: postgresql://argus:password@postgres:5432/argus_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./services/stream-ingestion:/app
      - ./libs/shared:/app/shared
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  vlm-inference:
    build: ./services/vlm-inference
    container_name: argus-vlm-inference
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./services/vlm-inference:/app
      - ./libs/shared:/app/shared
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  decision-engine:
    build: ./services/decision-engine
    container_name: argus-decision-engine
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_URL: postgresql://argus:password@postgres:5432/argus_db
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./services/decision-engine:/app
      - ./libs/shared:/app/shared
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  rag-chat:
    build: ./services/rag-chat
    container_name: argus-rag-chat
    ports:
      - "8007:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./services/rag-chat:/app
      - ./libs/shared:/app/shared
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - qdrant

  notification:
    build: ./services/notification
    container_name: argus-notification
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
    volumes:
      - ./services/notification:/app
      - ./libs/shared:/app/shared
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
          kafka:
            condition: service_started
          kafka-init:
            condition: service_completed_successfully

  actuation:
    build: ./services/actuation
    container_name: argus-actuation
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MQTT_BROKER: mosquitto
    volumes:
      - ./services/actuation:/app
      - ./libs/shared:/app/shared
    command: python src/main.py
    depends_on:
      kafka:
        condition: service_started
      mosquitto:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  dashboard:
    build: ./services/dashboard
    container_name: argus-dashboard
    ports:
      - "3000:3000"
    volumes:
      - ./services/dashboard:/app
      - /app/node_modules
      - ./libs/shared:/app/shared
    command: npm run dev -- --host
    depends_on:
      - decision-engine
      - rag-chat

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  mosquitto_data:
  mosquitto_log:
