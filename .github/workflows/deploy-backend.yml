name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "argusv/**"
      - ".github/workflows/deploy-backend.yml"

env:
  REGISTRY: registry.digitalocean.com/${{ secrets.DOCR_NAME }}
  IMAGE_NAME: argusv-backend

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Set image tag
        id: meta
        run: echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build image
        working-directory: argusv
        run: docker build -t ${{ steps.meta.outputs.tag }} .

      - name: Push image
        run: |
          docker push ${{ steps.meta.outputs.tag }}
          docker tag ${{ steps.meta.outputs.tag }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Ensure server directories exist
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: mkdir -p /opt/argusv/nginx

      - name: Sync compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "argusv/docker-compose.prod.yml"
          target: "/opt/argusv/"
          strip_components: 1

      - name: Sync nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "argusv/nginx/default.conf"
          target: "/opt/argusv/nginx/"
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /opt/argusv

            # Authenticate to DOCR on the server
            doctl registry login --expiry-seconds 600

            # Pull only the backend image and restart it
            docker compose -f docker-compose.prod.yml pull argusv
            docker compose -f docker-compose.prod.yml up -d --no-deps argusv

            # Reload nginx to pick up any config changes
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload || true

            # Remove dangling images to free disk
            docker image prune -f

            echo "✅ Backend deployed: ${{ needs.build-and-push.outputs.image_tag }}"
