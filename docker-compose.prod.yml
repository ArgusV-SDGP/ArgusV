version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: password
      POSTGRES_DB: argus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./configs/mosquitto:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # ---------------------------------------------------------------------------
  # PRODUCTION SERVICES (Immutable & Optimized)
  # ---------------------------------------------------------------------------

  edge-gateway:
    build: ./services/edge-gateway
    container_name: argus-edge-gateway
    restart: always
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RTSP_URLS: "rtsp://camera-ip:554/stream"
    depends_on:
      - kafka

  stream-ingestion:
    build: ./services/stream-ingestion
    container_name: argus-stream-ingestion
    restart: always
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_URL: postgresql://argus:password@postgres:5432/argus_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      - kafka
      - postgres
      - redis
      - minio

  vlm-inference:
    build: ./services/vlm-inference
    container_name: argus-vlm-inference
    restart: always
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - kafka

  decision-engine:
    build: ./services/decision-engine
    container_name: argus-decision-engine
    restart: always
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_URL: postgresql://argus:password@postgres:5432/argus_db
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - kafka
      - postgres
      - redis
      - qdrant

  rag-chat:
    build: ./services/rag-chat
    container_name: argus-rag-chat
    restart: always
    ports:
      - "8007:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - qdrant

  notification:
    build: ./services/notification
    container_name: argus-notification
    restart: always
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
    depends_on:
      - kafka

  actuation:
    build: ./services/actuation
    container_name: argus-actuation
    restart: always
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MQTT_BROKER: mosquitto
    depends_on:
      - kafka
      - mosquitto

  dashboard:
    build: ./services/dashboard
    container_name: argus-dashboard
    restart: always
    ports:
      - "80:80" # Standard HTTP port for Prod
    depends_on:
      - decision-engine
      - rag-chat

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  mosquitto_data:
  mosquitto_log:
