<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ArgusV — Digital NVR</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #0a0c10;
            --surface: #111318;
            --surface2: #1a1d24;
            --border: rgba(255, 255, 255, 0.07);
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --red: #ef4444;
            --orange: #f97316;
            --green: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ─────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 12, 16, 0.9);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            color: inherit;
        }

        .logo .icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* ── Layout ─────────────────── */
        main {
            display: grid;
            grid-template-columns: 320px 1fr;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ────────────────── */
        #sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 12px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        select, input {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        /* ── Player Section ─────────── */
        #player-section {
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        #video-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: auto;
        }

        canvas#bbox-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }

        /* ── Timeline ───────────────── */
        #timeline-container {
            height: 80px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            position: relative;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #timeline-rail {
            height: 12px;
            background: var(--surface2);
            border-radius: 6px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        #timeline-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--accent);
            width: 0%;
            pointer-events: none;
        }

        .marker {
            position: absolute;
            top: 0;
            width: 4px;
            height: 100%;
            opacity: 0.6;
        }

        .marker.THREAT { background: var(--red); }
        .marker.DETECT { background: var(--orange); }

        #timeline-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 10px;
            font-family: 'JetBrains Mono';
            color: var(--muted);
        }

        #playback-controls {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #player-section:hover #playback-controls {
            opacity: 1;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            padding: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            color: var(--accent);
        }

        /* ── Loading Overlay ────────── */
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--surface2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>

<body>
    <header>
        <a href="/" class="logo">
            <div class="icon">👁️</div>
            <span>ArgusV — Digital NVR</span>
        </a>
        <div id="clock" style="font-family: 'JetBrains Mono'; color: var(--muted); font-size: 13px;"></div>
    </header>

    <main>
        <aside id="sidebar">
            <div class="control-group">
                <div class="section-title">Camera Search</div>
                <select id="camera-select">
                    <option value="">Loading cameras...</option>
                </select>
            </div>

            <div class="control-group">
                <div class="section-title">Time Window</div>
                <select id="window-select">
                    <option value="1">Last 1 Hour</option>
                    <option value="3">Last 3 Hours</option>
                    <option value="12">Last 12 Hours</option>
                    <option value="24" selected>Last 24 Hours</option>
                </select>
            </div>

            <div class="control-group" style="flex-direction: row; gap: 10px; align-items: center;">
                <input type="checkbox" id="bbox-toggle" checked>
                <label for="bbox-toggle" style="font-size: 13px; cursor: pointer;">Show Bounding Boxes</label>
            </div>

            <div class="control-group" style="flex-direction: row; gap: 10px; align-items: center;">
                <input type="checkbox" id="events-only-toggle">
                <label for="events-only-toggle" style="font-size: 13px; cursor: pointer;">Events Only Mode</label>
            </div>

            <button id="load-btn" class="btn">Load Footage</button>

            <div style="flex: 1"></div>

            <div class="section-title">Status</div>
            <div id="status-text" style="font-size: 12px; color: var(--muted);">Select a camera to begin playback</div>
        </aside>

        <section id="player-section">
            <div id="loading-overlay">
                <div class="spinner"></div>
                <p style="margin-top: 16px; font-size: 14px;">Loading HLS Streams...</p>
            </div>

            <div id="video-container">
                <video id="video" crossorigin="anonymous"></video>
                <canvas id="bbox-overlay"></canvas>
            </div>

            <div id="playback-controls">
                <button id="play-pause" class="ctrl-btn">▶</button>
                <div id="current-time-display" style="color: white; font-size: 12px; font-family: 'JetBrains Mono'; margin: auto 10px;">00:00:00</div>
            </div>

            <div id="timeline-container">
                <div id="timeline-rail">
                    <div id="timeline-progress"></div>
                    <div id="markers-layer"></div>
                </div>
                <div id="timeline-labels">
                    <span id="start-label">--:--:--</span>
                    <span id="end-label">--:--:--</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('bbox-overlay');
        const ctx = canvas.getContext('2d');
        const hls = new Hls();

        let currentCamera = '';
        let timelineData = [];
        let startTime = null;
        let endTime = null;

        // ── Initialization ───────────────────────────────────────────────────

        async function init() {
            // Clock
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            }, 1000);

            // Fetch Cameras
            try {
                const res = await fetch('/api/cameras');
                const cams = await res.json();
                const select = document.getElementById('camera-select');
                select.innerHTML = cams.map(c => `<option value="${c.camera_id}">${c.name}</option>`).join('');
                if (cams.length > 0) currentCamera = cams[0].camera_id;
            } catch (err) {
                console.error("Failed to fetch cameras:", err);
            }
        }

        init();

        // ── Player Logic ─────────────────────────────────────────────────────

        document.getElementById('load-btn').onclick = loadFootage;

        async function loadFootage() {
            const camId = document.getElementById('camera-select').value;
            const hours = parseInt(document.getElementById('window-select').value);
            const eventsOnly = document.getElementById('events-only-toggle').checked;

            if (!camId) return;

            endTime = new Date();
            startTime = new Date(endTime.getTime() - hours * 6 * 60 * 1000); // 10% of scale for testing or full
            // Correction: actual hours
            startTime = new Date(endTime.getTime() - hours * 60 * 60 * 1000);

            document.getElementById('start-label').innerText = startTime.toLocaleTimeString();
            document.getElementById('end-label').innerText = endTime.toLocaleTimeString();
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('status-text').innerText = `Requesting HLS playlist...`;

            const playlistUrl = `/api/recordings/${camId}/playlist?start=${startTime.toISOString()}&end=${endTime.toISOString()}${eventsOnly ? '&only_events=true' : ''}`;
            const timelineUrl = `/api/recordings/${camId}/timeline?start=${startTime.toISOString()}&end=${endTime.toISOString()}`;

            // Load HLS
            if (Hls.isSupported()) {
                hls.loadSource(playlistUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('status-text').innerText = `Streaming ${camId} recordings`;
                    document.getElementById('play-pause').innerText = '⏸';
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        document.getElementById('status-text').innerText = "Error: No recordings found in range";
                        document.getElementById('loading-overlay').style.display = 'none';
                    }
                });
            }

            // Load Timeline
            try {
                const res = await fetch(timelineUrl);
                const data = await res.json();
                timelineData = data.markers;
                renderMarkers();
            } catch (err) {
                console.error("Timeline error:", err);
            }
        }

        function renderMarkers() {
            const layer = document.getElementById('markers-layer');
            layer.innerHTML = '';
            if (!startTime || !endTime) return;

            const totalMs = endTime.getTime() - startTime.getTime();

            timelineData.forEach(m => {
                const mDate = new Date(m.timestamp);
                const offsetMs = mDate.getTime() - startTime.getTime();
                const percent = (offsetMs / totalMs) * 100;
                
                if (percent >= 0 && percent <= 100) {
                    const div = document.createElement('div');
                    div.className = `marker ${m.is_threat ? 'THREAT' : 'DETECT'}`;
                    div.style.left = `${percent}%`;
                    layer.appendChild(div);
                }
            });
        }

        // ── Interaction ──────────────────────────────────────────────────────

        document.getElementById('play-pause').onclick = () => {
            if (video.paused) {
                video.play();
                document.getElementById('play-pause').innerText = '⏸';
            } else {
                video.pause();
                document.getElementById('play-pause').innerText = '▶';
            }
        };

        video.ontimeupdate = () => {
            const perc = (video.currentTime / video.duration) * 100;
            document.getElementById('timeline-progress').style.width = `${perc}%`;
            
            // Clock display
            if (startTime) {
                const currentDt = new Date(startTime.getTime() + video.currentTime * 1000);
                document.getElementById('current-time-display').innerText = currentDt.toLocaleTimeString();
            }

            drawBBoxes();
        };

        document.getElementById('timeline-rail').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const perc = x / rect.width;
            video.currentTime = perc * video.duration;
        };

        // ── Bounding Box Overlay ─────────────────────────────────────────────

        function drawBBoxes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!document.getElementById('bbox-toggle').checked) return;

            // Ensure canvas matches video display size
            if (canvas.width !== video.clientWidth || canvas.height !== video.clientHeight) {
                canvas.width = video.clientWidth;
                canvas.height = video.clientHeight;
            }

            const currentTime = new Date(startTime.getTime() + video.currentTime * 1000);
            
            // Find markers near current playback time (+/- 1s)
            const active = timelineData.filter(m => {
                const mTime = new Date(m.timestamp);
                const diff = Math.abs(mTime - currentTime);
                return diff < 800; // 800ms window
            });

            active.forEach(det => {
                    const box = det.bbox;
                    if (!box) return;

                    // Assuming detection was done on some reference resolution (e.g. 1920x1080 or the original video res)
                    // We need scale factors.
                    // If backend sends absolute pixels, we need video.videoWidth/Height.
                    const scaleX = canvas.width / (video.videoWidth || 1);
                    const scaleY = canvas.height / (video.videoHeight || 1);

                    const x1 = box.x1 * scaleX;
                    const y1 = box.y1 * scaleY;
                    const w = (box.x2 - box.x1) * scaleX;
                    const h = (box.y2 - box.y1) * scaleY;

                    ctx.strokeStyle = det.is_threat ? '#ef4444' : '#f97316';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x1, y1, w, h);

                    // Label
                    ctx.fillStyle = det.is_threat ? '#ef4444' : '#f97316';
                    ctx.font = 'bold 12px Inter';
                    ctx.fillText(`${det.object_class} (${Math.round(det.confidence * 100)}%)`, x1, y1 > 20 ? y1 - 5 : y1 + 15);
            });
        }

    </script>
</body>

</html>
