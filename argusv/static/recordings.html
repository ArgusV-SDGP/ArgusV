<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ArgusV — Recordings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <!-- HLS.js for browser HLS playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* TODO DNVR-01: Full NVR recordings page
       Tasks to implement:
         DNVR-01  page shell + camera selector + date picker
         DNVR-02  HLS.js player wired to /api/recordings/{cam}/playlist
         DNVR-03  24-hour timeline bar with click-to-jump
         DNVR-04  Detection blips (orange/red) on seek bar
         DNVR-05  Bounding box overlay on video at playback position
         DNVR-06  Events-only toggle (filter segments with detections)
         DNVR-07  Clip download button
         DNVR-08  Incident replay from card
    */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c10;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
        }

        p {
            color: #64748b;
            font-size: 14px;
        }

        a {
            color: #3b82f6;
            text-decoration: none;
        }

        .badge {
            background: #1a1d24;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            padding: 24px 32px;
            text-align: center;
            max-width: 400px;
        }

        .task {
            font-family: 'JetBrains Mono';
            font-size: 11px;
            color: #f97316;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="badge">
        <h1>📹 Recordings</h1>
        <p>NVR replay page — coming soon</p>
        <div class="task">Tasks: DNVR-01 through DNVR-08</div>
        <div style="margin-top:8px;font-size:12px;color:#94a3b8;" id="auth-user"></div>
        <br />
        <a href="/">← Back to Live Feed</a>
        <button id="logoutBtn" style="margin-left:8px;border:none;background:#1f2937;color:#e2e8f0;border-radius:6px;padding:6px 10px;cursor:pointer;">Logout</button>
    </div>
    <!-- TODO DNVR-01: implement full recordings UI here -->
    <script src="/static/auth.js"></script>
    <script>
        (async () => {
            const me = await window.ArgusAuth.requireAuth();
            if (!me) return;
            document.getElementById("auth-user").textContent = `Logged in as ${me.username} (${me.role})`;
            document.getElementById("logoutBtn").addEventListener("click", () => window.ArgusAuth.logout());
        })();
    </script>
</body>

</html>
