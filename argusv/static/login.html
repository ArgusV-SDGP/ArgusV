<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ArgusV — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c10;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #131823;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 22px;
    }
    h1 { font-size: 22px; margin-bottom: 6px; }
    p { color: #94a3b8; font-size: 13px; margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin: 8px 0 6px; }
    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.14);
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px;
    }
    button {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 8px;
      padding: 11px 14px;
      font-weight: 600;
      background: #1d4ed8;
      color: #fff;
      cursor: pointer;
    }
    .status { margin-top: 10px; min-height: 18px; font-size: 13px; }
    .status.error { color: #fda4af; }
    .status.success { color: #86efac; }
  </style>
</head>

<body>
  <div class="card">
    <h1>🔐 ArgusV Login</h1>
    <p>Sign in to access dashboard, zones, incidents, and recordings.</p>
    <form id="loginForm">
      <label for="username">Username</label>
      <input id="username" required />
      <label for="password">Password</label>
      <input id="password" type="password" required />
      <button type="submit">Login</button>
    </form>
    <div id="status" class="status"></div>
  </div>

  <script src="/static/auth.js"></script>
  <script>
    const statusEl = document.getElementById("status");
    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = `status ${type}`;
    }

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      try {
        const res = await fetch("/auth/token", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.detail || `Login failed (${res.status})`);
        window.ArgusAuth.setTokens(body.access_token || "", body.refresh_token || "");
        setStatus("Login successful. Redirecting…", "success");
        const params = new URLSearchParams(window.location.search);
        const next = params.get("next") || "/";
        window.location.href = next;
      } catch (error) {
        setStatus(error.message, "error");
      }
    });
  </script>
</body>

</html>
