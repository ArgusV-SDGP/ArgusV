<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ArgusV — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c10;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      justify-content: center;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    .card {
      background: #131823;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
    }

    /* — Tab switcher — */
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .tab-btn {
      flex: 1;
      padding: 14px;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }

    .tab-btn:hover {
      color: #e2e8f0;
    }

    .tab-btn.active {
      color: #3b82f6;
      background: rgba(59, 130, 246, 0.06);
      box-shadow: inset 0 -2px 0 #3b82f6;
    }

    /* — Form — */
    .form-body {
      padding: 26px;
      display: none;
    }

    .form-body.active {
      display: block;
    }

    .form-desc {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, .10);
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .field {
      margin-bottom: 14px;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.2px;
    }

    button[type="submit"]:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 12px;
      min-height: 18px;
      font-size: 12px;
      text-align: center;
      border-radius: 6px;
      padding: 0;
      transition: all 0.2s;
    }

    .status.error {
      color: #fda4af;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 8px 12px;
    }

    .status.success {
      color: #86efac;
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.2);
      padding: 8px 12px;
    }

    .hint {
      font-size: 11px;
      color: #475569;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="wrapper">

    <div class="brand">
      <div class="brand-icon">🛡</div>
      <span class="brand-name">ArgusV</span>
    </div>

    <div class="card">
      <!-- Tab switcher -->
      <div class="tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div class="form-body active" id="form-login">
        <p class="form-desc">Sign in to access the surveillance dashboard, zones, incidents, and recordings.</p>
        <form id="loginForm" autocomplete="on">
          <div class="field">
            <label for="login-username">Username</label>
            <input id="login-username" name="username" autocomplete="username" required placeholder="admin" />
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button type="submit" id="loginBtn">Sign In</button>
          <div id="login-status" class="status"></div>
        </form>
      </div>

      <!-- REGISTER FORM -->
      <div class="form-body" id="form-register">
        <p class="form-desc">Create a new viewer account. New accounts get <strong>viewer</strong> role by default.</p>
        <form id="registerForm" autocomplete="off">
          <div class="field">
            <label for="reg-username">Username</label>
            <input id="reg-username" name="username" autocomplete="off" required placeholder="e.g. john_doe"
              minlength="3" maxlength="64" />
            <p class="hint">3–64 characters, no spaces.</p>
          </div>
          <div class="field">
            <label for="reg-password">Password</label>
            <input id="reg-password" name="password" type="password" autocomplete="new-password" required
              placeholder="Min. 8 characters" minlength="8" />
          </div>
          <div class="field">
            <label for="reg-confirm">Confirm Password</label>
            <input id="reg-confirm" name="confirm" type="password" autocomplete="new-password" required
              placeholder="Repeat your password" />
          </div>
          <button type="submit" id="registerBtn">Create Account</button>
          <div id="register-status" class="status"></div>
        </form>
      </div>
    </div>

  </div>

  <script src="/static/auth.js"></script>
  <script>
    // Redirect if already logged in
    (async () => {
      const me = await window.ArgusAuth.fetchMe();
      if (me) {
        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get("next") || "/";
      }
    })();

    function switchTab(name) {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".form-body").forEach(f => f.classList.remove("active"));
      document.getElementById("tab-" + name).classList.add("active");
      document.getElementById("form-" + name).classList.add("active");
    }

    function setStatus(elId, text, type = "") {
      const el = document.getElementById(elId);
      el.textContent = text;
      el.className = "status " + type;
    }

    // ---- LOGIN ----
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("loginBtn");
      btn.disabled = true;
      btn.textContent = "Signing in…";
      setStatus("login-status", "", "");

      const username = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value;

      try {
        const res = await fetch("/auth/token", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.detail || `Login failed (${res.status})`);

        window.ArgusAuth.setTokens(body.access_token || "", body.refresh_token || "");
        setStatus("login-status", "✓ Login successful. Redirecting…", "success");

        const params = new URLSearchParams(window.location.search);
        setTimeout(() => { window.location.href = params.get("next") || "/"; }, 600);
      } catch (err) {
        setStatus("login-status", err.message, "error");
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    });

    // ---- REGISTER ----
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("registerBtn");
      setStatus("register-status", "", "");

      const username = document.getElementById("reg-username").value.trim();
      const password = document.getElementById("reg-password").value;
      const confirm = document.getElementById("reg-confirm").value;

      if (password !== confirm) {
        setStatus("register-status", "Passwords do not match.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Creating account…";

      try {
        const res = await fetch("/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.detail || `Registration failed (${res.status})`);

        setStatus("register-status", `✓ Account "${body.username}" created! Switching to sign in…`, "success");

        // Auto-switch to login tab after success
        setTimeout(() => {
          document.getElementById("login-username").value = username;
          switchTab("login");
        }, 1500);
      } catch (err) {
        setStatus("register-status", err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Create Account";
      }
    });
  </script>
</body>

</html>
