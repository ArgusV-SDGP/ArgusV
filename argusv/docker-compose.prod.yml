# ArgusV — Production Compose
# Images are pulled from DOCR (pushed by GitHub Actions).
# Secrets are loaded from /opt/argusv/.env.prod on the server.
#
# Usage on server:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:

  argusv:
    image: ${DOCR_REGISTRY}/argusv-backend:latest
    container_name: argusv
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env.prod
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      RTSP_HOST: mediamtx
    volumes:
      - ${ARGUSV_SEGMENTS_DIR:-./tmp/argus_segments}:/tmp/argus_segments
      - ${ARGUSV_RECORDINGS_DIR:-./recordings}:/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ${DOCR_REGISTRY}/argusv-frontend:latest
    container_name: argusv-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: argusv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - argusv
      - frontend

  postgres:
    image: pgvector/pgvector:pg15
    container_name: argus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: argus-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: argus-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
    environment:
      MTX_PROTOCOLS: tcp
      MTX_HLSADDRESS: :8888
      MTX_RTSPADDRESS: :8554
      MTX_WEBRTCADDRESS: :8889
      MTX_HLSALWAYSREMUX: "yes"
      MTX_HLSSEGMENTCOUNT: "7"
      MTX_HLSSEGMENTDURATION: 2s
      MTX_HLSALLOWORIGIN: "*"
      MTX_LOGLEVEL: warn
      MTX_API: "yes"

volumes:
  postgres_data:
  redis_data:
