[alembic]
script_location = alembic
# URL is overridden at runtime by the POSTGRES_URL env var (see alembic/env.py).
# This fallback matches the local docker-compose default.
sqlalchemy.url = postgresql://argus:password@localhost:5434/argus_db_new

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
