# ArgusV Dev — Infrastructure only (no app build)
# Run: docker compose -f docker-compose.dev.yml up -d
# Then: run uvicorn locally with live reload

services:

  postgres:
    image: pgvector/pgvector:pg15
    container_name: argus-postgres-dev
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: password
      POSTGRES_DB: argus_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U argus -d argus_db" ]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: argus-redis-dev
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MediaMTX — RTSP → HLS broadcaster ──────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: argus-mediamtx-dev
    ports:
      - "8554:8554"   # RTSP input
      - "8888:8888"   # HLS output  → http://localhost:8888/cam-01/index.m3u8
      - "8889:8889"   # WebRTC output
      - "9997:9997"   # Control API → http://localhost:9997/v3/paths/list
    environment:
      MTX_PROTOCOLS: tcp
      MTX_HLSADDRESS: :8888
      MTX_RTSPADDRESS: :8554
      MTX_WEBRTCADDRESS: :8889
      MTX_HLSALWAYSREMUX: "yes"
      MTX_HLSSEGMENTCOUNT: "3"
      MTX_HLSSEGMENTDURATION: 2s
      MTX_HLSALLOWORIGIN: "*"
      MTX_LOGLEVEL: info
      MTX_API: "yes"
      MTX_APIADDRESS: :9997

  # ── RTSP Stream Simulator ───────────────────────────────────────────
  # Pushes a test video pattern directly to MediaMTX from INSIDE Docker.
  # This bypasses all Windows/WSL2 networking issues entirely.
  # → HLS output will be at: http://localhost:8888/cam-01/index.m3u8
  #
  # TO USE YOUR REAL VIDEO FILE instead of the test pattern:
  #   1. Comment out the "command:" block below
  #   2. Uncomment the VIDEO FILE block and set VIDEO_PATH
  rtsp-sim:
    image: jrottenberg/ffmpeg:5.1-alpine
    container_name: argus-rtsp-sim
    depends_on:
      - mediamtx
    restart: on-failure
    # ── Test pattern (no file needed) ──
    command: >
      -re -f lavfi
      -i "testsrc2=size=1280x720:rate=25"
      -vf "drawtext=text='ArgusV Cam-01':fontcolor=white:fontsize=28:x=20:y=20,
           drawtext=text='%{localtime}':fontcolor=yellow:fontsize=20:x=20:y=60"
      -c:v libx264 -preset ultrafast -tune zerolatency
      -g 50 -pix_fmt yuv420p
      -f rtsp -rtsp_transport tcp
      rtsp://mediamtx:8554/cam-01

    # ── YOUR REAL VIDEO FILE (uncomment + edit path) ──
    # volumes:
    #   - /mnt/c/Users/sabesonk/Videos/Captures:/videos:ro
    # command: >
    #   -re -stream_loop -1
    #   -i "/videos/Dream Weddings - Plan Your Perfect Wedding in Sri Lanka - Google Chrome 2026-02-14 10-56-46.mp4"
    #   -c:v copy -c:a aac
    #   -f rtsp -rtsp_transport tcp
    #   rtsp://mediamtx:8554/cam-01

volumes:
  postgres_dev_data:
  redis_dev_data:
