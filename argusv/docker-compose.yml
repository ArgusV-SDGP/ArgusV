# ArgusV Monolith — 4 containers (was 13)
# Drop: Kafka, Zookeeper, MinIO, Qdrant, 7 Python services
# Keep: ArgusV, Postgres, Redis, MediaMTX

services:

  argusv:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: argusv
    ports:
      - "8000:8000" # Dashboard at http://localhost:8000
    environment:
      # ── Infrastructure ──────────────────────
      POSTGRES_URL: postgresql://argus:password@postgres:5432/argus_db
      REDIS_URL: redis://redis:6379/0

      # ── Camera ──────────────────────────────────
      # Inside Docker, cameras reach MediaMTX at "mediamtx".
      # Default CAMERAS config auto-generates cam-01 + cam-02 using RTSP_HOST.
      RTSP_HOST: "mediamtx"

      # ── Detection ────────────────────────────
      DETECT_FPS: "5"
      YOLO_MODEL: "yolov8n.pt"
      CONF_THRESHOLD: "0.45"
      USE_MOTION_GATE: "true"
      MOTION_THRESHOLD: "0.003"
      USE_TRACKER: "true"
      LOITER_THRESHOLD_SEC: "30"
      EMBED_FRAME: "true"

      # ── Recording ────────────────────────────
      RECORDINGS_ENABLED: "true"  # ✅ ENABLED for local recording
      SEGMENT_TMP_DIR: "/tmp/argus_segments"
      LOCAL_RECORDINGS_DIR: "/recordings"

      # ── VLM ──────────────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      USE_TIERED_VLM: "true"
      VLM_MAX_WORKERS: "2"

      # ── Notifications ─────────────────────────
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_CHANNEL_ID: "#argus-alerts"

      LOG_LEVEL: "INFO"

    volumes:
      - ./tmp/argus_segments:/tmp/argus_segments
      - ./recordings:/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg15
    container_name: argus-postgres
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: password
      POSTGRES_DB: argus_db
    ports:
      - "5433:5432" # host:container — avoids conflict with existing postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../configs/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U argus" ]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: argus-redis
    ports:
      - "6380:6379" # host:container — avoids conflict with existing redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # Live stream re-broadcaster (RTSP → HLS for dashboard)
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: argus-mediamtx
    ports:
      - "8554:8554" # RTSP input (your camera points here)
      - "8888:8888" # HLS output  → http://localhost:8888/cam-01/index.m3u8
      - "8889:8889" # WebRTC output
    environment:
      MTX_PROTOCOLS: tcp
      MTX_HLSADDRESS: :8888
      MTX_RTSPADDRESS: :8554
      MTX_WEBRTCADDRESS: :8889
      MTX_HLSALWAYSREMUX: "yes"
      MTX_HLSSEGMENTCOUNT: "7"
      MTX_HLSSEGMENTDURATION: 2s
      MTX_HLSALLOWORIGIN: "*"
      MTX_LOGLEVEL: info
      MTX_API: "yes"

  # ── Demo RTSP stream simulators ─────────────────────────────────────────
  # Push looping video to MediaMTX so demo cameras have something to show.
  # Replace with real camera RTSP URLs in production by setting CAMERAS env.
  rtsp-sim-cam01:
    image: jrottenberg/ffmpeg:5.1-alpine
    platform: linux/amd64
    container_name: argus-rtsp-sim-cam01
    depends_on:
      - mediamtx
    restart: unless-stopped
    volumes:
      - ./tmp:/videos:ro
    command: >
      -re -stream_loop -1
      -i "/videos/demo.mp4"
      -c:v libx264 -preset ultrafast -tune zerolatency
      -an
      -f rtsp -rtsp_transport tcp
      rtsp://mediamtx:8554/cam-01

  rtsp-sim-cam02:
    image: jrottenberg/ffmpeg:5.1-alpine
    platform: linux/amd64
    container_name: argus-rtsp-sim-cam02
    depends_on:
      - mediamtx
    restart: unless-stopped
    volumes:
      - ./tmp:/videos:ro
    command: >
      -re -stream_loop -1
      -i "/videos/demo2.mp4"
      -c:v libx264 -preset ultrafast -tune zerolatency
      -an
      -f rtsp -rtsp_transport tcp
      rtsp://mediamtx:8554/cam-02

volumes:
  postgres_data:
  redis_data:
