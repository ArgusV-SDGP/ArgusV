# ArgusV — Production stack
# Multi-stage builds: builder stage compiles deps, runtime stage is lean.
#
# Services:
#   argusv      — Python FastAPI backend  (port 8000)
#   frontend    — Next.js 15 App Router   (port 3000)
#   postgres    — pgvector:pg15           (port 5433)
#   redis       — Redis 7                 (port 6380)
#   mediamtx    — RTSP → HLS broadcaster  (ports 8554 / 8888 / 8889)
#   rtsp-sim-*  — Demo RTSP stream simulators (remove in production)
#
# Usage:
#   cp .env.example .env && nano .env
#   docker compose build --build-arg NEXT_PUBLIC_BASE_URL=http://<server-ip>:8000
#   docker compose up -d

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── ArgusV backend ────────────────────────────────────────────────────────
  argusv:
    build:
      context: .
      dockerfile: Dockerfile
      # target: builder  # uncomment to debug the builder stage
      target: runtime
      args:
        BUILDKIT_INLINE_CACHE: "1"
    image: argusv-backend:latest
    container_name: argusv
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Container-internal addresses (override .env values)
      POSTGRES_URL: postgresql://argus:${POSTGRES_PASSWORD:-password}@postgres:5432/argus_db
      REDIS_URL: redis://redis:6379/0
      RTSP_HOST: "mediamtx"
      # Recording paths inside the container
      SEGMENT_TMP_DIR: "/tmp/argus_segments"
      LOCAL_RECORDINGS_DIR: "/recordings"
      MEDIAMTX_HLS_BASE: "http://mediamtx:8888"
    volumes:
      - argus_segments:/tmp/argus_segments
      - argus_recordings:/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Next.js frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../argusv-forntend-
      dockerfile: Dockerfile
      target: runner
      args:
        BUILDKIT_INLINE_CACHE: "1"
        # Baked into the static bundle at build time.
        # Change to your server IP or domain for remote deployments.
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:8000}
    image: argusv-frontend:latest
    container_name: argusv-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      argusv:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: argus-postgres
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: argus_db
    ports:
      - "5433:5432"   # host:container — avoids conflict with a local postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../configs/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: argus-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6380:6379"   # host:container — avoids conflict with a local redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  # ── MediaMTX — RTSP → HLS/WebRTC broadcaster ─────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: argus-mediamtx
    ports:
      - "8554:8554"   # RTSP input  — point your IP camera here
      - "8888:8888"   # HLS output  — http://localhost:8888/cam-01/index.m3u8
      - "8889:8889"   # WebRTC output
      - "9997:9997"   # Management API
    environment:
      MTX_PROTOCOLS: tcp
      MTX_HLSADDRESS: :8888
      MTX_RTSPADDRESS: :8554
      MTX_WEBRTCADDRESS: :8889
      MTX_APIADDRESS: :9997
      MTX_HLSALWAYSREMUX: "yes"
      MTX_HLSSEGMENTCOUNT: "7"
      MTX_HLSSEGMENTDURATION: 2s
      MTX_HLSALLOWORIGIN: "*"
      MTX_LOGLEVEL: info
      MTX_API: "yes"
    restart: unless-stopped
    logging: *default-logging

  # ── Demo RTSP stream simulators ───────────────────────────────────────────
  # These push looping demo.mp4 / demo2.mp4 to MediaMTX so the dashboard has
  # something to show out of the box.
  # ► Remove or comment out in production (real cameras push their own RTSP).
  rtsp-sim-cam01:
    image: jrottenberg/ffmpeg:5.1-alpine
    platform: linux/amd64
    container_name: argus-rtsp-sim-cam01
    depends_on:
      - mediamtx
    restart: unless-stopped
    volumes:
      - ./tmp:/videos:ro
    command: >
      -re -stream_loop -1
      -i "/videos/demo.mp4"
      -c:v libx264 -preset ultrafast -tune zerolatency
      -an
      -f rtsp -rtsp_transport tcp
      rtsp://mediamtx:8554/cam-01
    logging: *default-logging

  rtsp-sim-cam02:
    image: jrottenberg/ffmpeg:5.1-alpine
    platform: linux/amd64
    container_name: argus-rtsp-sim-cam02
    depends_on:
      - mediamtx
    restart: unless-stopped
    volumes:
      - ./tmp:/videos:ro
    command: >
      -re -stream_loop -1
      -i "/videos/demo2.mp4"
      -c:v libx264 -preset ultrafast -tune zerolatency
      -an
      -f rtsp -rtsp_transport tcp
      rtsp://mediamtx:8554/cam-02
    logging: *default-logging

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  argus_segments:   # /tmp/argus_segments inside argusv container
  argus_recordings: # /recordings inside argusv container
