# ArgusV Nginx reverse proxy
# Routes: / → frontend:3000   /api → argusv:8000   /ws → argusv:8000

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS (uncomment when cert is ready)
    # return 301 https://$host$request_uri;

    # ── Frontend ──────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── ArgusV static files & recorded segments ───────────────────────────────
    location /static/ {
        proxy_pass         http://argusv:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /recordings/ {
        proxy_pass         http://argusv:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        # Allow large .ts segment downloads without timeout
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }

    # ── Backend REST API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://argusv:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket (alerts + chat) ─────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://argusv:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── HLS streams from MediaMTX ─────────────────────────────────────────────
    location /hls/ {
        proxy_pass         http://mediamtx:8888/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control no-cache;
        add_header         Access-Control-Allow-Origin *;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://argusv:8000/health;
    }
}
